<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge Tycoon: Pro Edition</title>
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <style>
        :root { --neon-blue: #00f2fe; --neon-pink: #ff007f; --gold: #f1c40f; }
        body { margin: 0; overflow: hidden; background: #0b0e14; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; color: white; }
        #game-canvas { width: 100vw; height: 100vh; position: relative; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }

        /* Üst UI */
        #ui-top {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(20, 20, 35, 0.9); backdrop-filter: blur(10px);
            border: 2px solid var(--neon-blue); border-radius: 20px;
            padding: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100;
        }
        #money-display { font-size: 32px; font-weight: bold; color: var(--gold); }
        #income-display { font-size: 14px; color: var(--neon-blue); margin-top: 4px; }

        /* Market Alanı - Yeni Tasarım */
        #shop-container {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; gap: 20px; z-index: 100;
        }
        .shop-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .buy-btn {
            width: 90px; height: 90px; background: #fff no-repeat center;
            background-size: 65%; border: none; border-radius: 20px;
            cursor: pointer; position: relative; transition: 0.2s;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .buy-btn:active { transform: scale(0.9); }
        .buy-btn:disabled { filter: grayscale(1); opacity: 0.4; pointer-events: none; }
        
        /* Fiyat Etiketi */
        .price-tag {
            background: #27ae60; color: white; padding: 4px 10px;
            border-radius: 8px; font-weight: bold; font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .lock-text { font-size: 10px; color: var(--neon-pink); font-weight: bold; }

        /* Oyun Objeleri */
        .item {
            position: absolute; width: 100px; height: 100px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transform: translate(-50%, -50%); z-index: 5;
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.3));
        }
        .item-lvl {
            position: absolute; top: -8px; right: -8px;
            background: linear-gradient(45deg, var(--neon-blue), #0072ff);
            color: white; width: 30px; height: 30px; border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; border: 2px solid white; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="game-canvas">
    <div id="ui-top">
        <div id="money-display">💰 <span id="m-val">150</span></div>
        <div id="income-display">OTOMATİK KAZANÇ: +<span id="i-val">0</span>/sn</div>
    </div>

    <div id="shop-container">
        <div class="shop-item">
            <button id="btn-lvl1" class="buy-btn" onclick="buy(1, 25)" style="background-image: url('assets/png1.png')">
                <div class="price-tag">25 💰</div>
            </button>
            <div style="font-size:10px">LVL 1</div>
        </div>
        
        <div class="shop-item" id="fast-buy-slot">
            <button id="btn-fast" class="buy-btn" disabled>
                <div class="price-tag" id="fast-price">???</div>
            </button>
            <div class="lock-text" id="lock-msg">LVL 4 GEREKLİ</div>
        </div>
    </div>
</div>

<script>
let money = 150;
let maxLvl = 1;
let fastBuyLvl = 1; // Marketin sattığı üst seviye
let ysdk = null;

const sndBuy = new Audio('assets/buy.mp3');
const sndMerge = new Audio('assets/merge.mp3');

YaGames.init().then(sdk => { ysdk = sdk; });

// --- GELİR SİSTEMİ ---
setInterval(() => {
    let income = 0;
    document.querySelectorAll('.item').forEach(item => {
        let lvl = parseInt(item.dataset.lvl);
        income += Math.pow(lvl, 1.6); 
    });
    
    let totalIncome = Math.floor(income);
    document.getElementById('i-val').innerText = totalIncome;
    
    if (totalIncome > 0) {
        money += totalIncome;
        updateUI();
    }
}, 1000);

function updateUI() {
    document.getElementById('m-val').innerText = Math.floor(money);
    document.getElementById('btn-lvl1').disabled = (money < 25);
    
    // Hızlı Satın Alma Güncelleme
    const fastBtn = document.getElementById('btn-fast');
    const lockMsg = document.getElementById('lock-msg');
    const priceTag = document.getElementById('fast-price');
    
    // Eğer oyuncu Level 4'e ulaştıysa Level 2 satmaya başla
    if (maxLvl >= 4) {
        fastBuyLvl = maxLvl - 2; // Strateji: En yüksek seviyenin 2 altını sat
        let price = Math.floor(25 * Math.pow(3, fastBuyLvl)); // Her seviye için 3 katı fiyat
        
        fastBtn.disabled = (money < price);
        fastBtn.style.backgroundImage = `url('assets/png${fastBuyLvl}.png')`;
        fastBtn.onclick = () => buy(fastBuyLvl, price);
        priceTag.innerText = price + " 💰";
        lockMsg.innerText = "HIZLI AL: LVL " + fastBuyLvl;
        lockMsg.style.color = "#2ecc71";
    }
}

function buy(lvl, cost) {
    if (money >= cost) {
        money -= cost;
        sndBuy.play().catch(()=>{});
        updateUI();
        createItem(lvl, window.innerWidth/2, window.innerHeight/2);
    }
}

function createItem(lvl, x, y) {
    const el = document.createElement('div');
    el.className = 'item';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.style.backgroundImage = `url('assets/png${lvl}.png')`;
    el.dataset.lvl = lvl;

    const tag = document.createElement('div');
    tag.className = 'item-lvl'; tag.innerText = lvl;
    el.appendChild(tag);
    
    // Pop animasyonu
    el.style.transform = 'translate(-50%, -50%) scale(0)';
    setTimeout(() => el.style.transform = 'translate(-50%, -50%) scale(1)', 50);

    makeDraggable(el);
    document.getElementById('game-canvas').appendChild(el);
}

function makeDraggable(el) {
    let dx = 0, dy = 0, dragging = false;
    const start = (e) => {
        dragging = true; el.style.zIndex = 1000;
        const p = e.type.includes('touch') ? e.touches[0] : e;
        dx = p.clientX - el.offsetLeft; dy = p.clientY - el.offsetTop;
    };
    const move = (e) => {
        if (!dragging) return;
        const p = e.type.includes('touch') ? e.touches[0] : e;
        el.style.left = (p.clientX - dx) + 'px';
        el.style.top = (p.clientY - dy) + 'px';
    };
    const stop = () => {
        if (!dragging) return;
        dragging = false; el.style.zIndex = 5;
        checkMerge(el);
    };
    el.onmousedown = start; window.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
    el.ontouchstart = start; window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', stop);
}

function checkMerge(dragged) {
    const items = document.querySelectorAll('.item');
    items.forEach(other => {
        if (other === dragged) return;
        const dist = Math.hypot(dragged.offsetLeft - other.offsetLeft, dragged.offsetTop - other.offsetTop);
        if (dist < 80 && dragged.dataset.lvl === other.dataset.lvl) {
            const next = parseInt(dragged.dataset.lvl) + 1;
            if (next <= 50) {
                sndMerge.play().catch(()=>{});
                createItem(next, other.offsetLeft, other.offsetTop);
                if (next > maxLvl) { maxLvl = next; if(next === 50 && ysdk) ysdk.adv.showFullscreenAdv(); }
                dragged.remove(); other.remove();
                updateUI();
            }
        }
    });
}
</script>
</body>
</html>
