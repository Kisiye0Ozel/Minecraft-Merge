<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Merge Tycoon</title>
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <style>
        /* MINECRAFT TARZI YÜKLEME EKRANI */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            font-family: 'Courier New', Courier, monospace; color: #fff;
        }
        .pixel-loader {
            width: 200px; height: 20px; border: 4px solid #fff;
            padding: 2px; margin-top: 20px;
        }
        #progress-bar { width: 0%; height: 100%; background: #3ff23f; } /* Minecraft yeşili */
        #loading-text { font-size: 24px; text-shadow: 3px 3px #000; letter-spacing: 2px; }

        /* OYUN TEMELLERİ */
        body { margin: 0; overflow: hidden; background: #0b0e14; font-family: sans-serif; user-select: none; touch-action: none; }
        #game-canvas { width: 100vw; height: 100vh; position: relative; }

        /* UI PANLLERİ */
        #ui-top {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0,0,0,0.8); border: 4px solid #555;
            padding: 10px; text-align: center; z-index: 100;
        }
        #money-display { font-size: 30px; color: #ff0; font-family: 'Courier New', monospace; font-weight: bold; }

        /* MARKET BUTONLARI */
        #shop { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 100; }
        .buy-btn {
            width: 80px; height: 80px; background: #fff no-repeat center; background-size: 70%;
            border: 4px solid #333; cursor: pointer; position: relative;
        }

        /* DİNAMİK IŞIK YAYAN OBJELER */
        .item {
            position: absolute; width: 100px; height: 100px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transform: translate(-50%, -50%); z-index: 5;
            /* Işık efekti JavaScript ile dinamik değişecek */
            transition: filter 0.3s; 
        }
        .item-lvl {
            position: absolute; top: -5px; right: -5px; background: #000; color: #fff;
            padding: 2px 6px; border: 2px solid #fff; font-family: monospace; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div id="loading-text">DÜNYA YÜKLENİYOR...</div>
    <div class="pixel-loader"><div id="progress-bar"></div></div>
</div>

<div id="game-canvas">
    <div id="ui-top">
        <div id="money-display">ALTIN: <span id="m-val">150</span></div>
    </div>
    <div id="shop">
        <button id="buy-1" class="buy-btn" onclick="buy(1, 25)" style="background-image:url('assets/png1.png')"></button>
        <button id="ad-btn" class="buy-btn" onclick="watchAd()" style="background: #f1c40f; font-size: 40px;">📺</button>
    </div>
</div>

<script>
let money = 150;
let maxLvl = 1;
let ysdk = null;

// --- YÜKLEME EKRANI SİMÜLASYONU ---
let progress = 0;
const prgBar = document.getElementById('progress-bar');
const loader = setInterval(() => {
    progress += Math.random() * 15;
    if(progress > 100) progress = 100;
    prgBar.style.width = progress + "%";
    if(progress === 100) {
        clearInterval(loader);
        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
    }
}, 200);

// --- RENK PALETİ (Her PNG seviyesi için farklı ışık rengi) ---
function getGlowColor(lvl) {
    const colors = [
        "rgba(255, 255, 255, 0.5)", // Lvl 1: Beyaz
        "rgba(0, 255, 0, 0.6)",     // Lvl 2: Yeşil
        "rgba(0, 200, 255, 0.7)",   // Lvl 3: Mavi
        "rgba(255, 0, 255, 0.8)",   // Lvl 4: Mor
        "rgba(255, 255, 0, 0.9)",   // Lvl 5: Sarı
        "rgba(255, 69, 0, 1.0)"      // Lvl 6+: Turuncu/Kırmızı
    ];
    // Seviye arttıkça renk döngüsüne girer veya 6'dan sonrasını hep güçlü kırmızı yapar
    return colors[Math.min(lvl - 1, colors.length - 1)];
}

// --- SDK VE GELİR ---
YaGames.init().then(sdk => { ysdk = sdk; });

setInterval(() => {
    let income = 0;
    document.querySelectorAll('.item').forEach(i => income += Math.pow(parseInt(i.dataset.lvl), 1.5));
    money += Math.floor(income);
    document.getElementById('m-val').innerText = Math.floor(money);
}, 1000);

function buy(lvl, cost) {
    if (money >= cost) {
        money -= cost;
        createItem(lvl, window.innerWidth/2, window.innerHeight/2);
    }
}

function createItem(lvl, x, y) {
    const el = document.createElement('div');
    el.className = 'item';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.style.backgroundImage = `url('assets/png${lvl}.png')`;
    el.dataset.lvl = lvl;

    // DİNAMİK IŞIK EFEKTİ (Drop Shadow Glow)
    const glowColor = getGlowColor(lvl);
    el.style.filter = `drop-shadow(0 0 15px ${glowColor})`;

    const tag = document.createElement('div');
    tag.className = 'item-lvl'; tag.innerText = lvl;
    el.appendChild(tag);

    makeDraggable(el);
    document.getElementById('game-canvas').appendChild(el);
}

// --- REKLAM ---
function watchAd() {
    if (ysdk) {
        ysdk.adv.showRewardedVideo({
            callbacks: {
                onRewarded: () => {
                    let gift = Math.max(1, maxLvl - 1);
                    createItem(gift, window.innerWidth/2, 100);
                }
            }
        });
    }
}

// Sürükle-bırak ve birleştirme mekanikleri önceki kodla aynı kalacak şekilde entegre edilir.
// (Kısalık adına temel mantığı buraya eklemiyorum ama yukarıdaki createItem ile uyumlu çalışır)

function makeDraggable(el) {
    let dx = 0, dy = 0, dragging = false;
    const start = (e) => {
        dragging = true; el.style.zIndex = 1000;
        const p = e.type.includes('touch') ? e.touches[0] : e;
        dx = p.clientX - el.offsetLeft; dy = p.clientY - el.offsetTop;
    };
    const move = (e) => {
        if (!dragging) return;
        const p = e.type.includes('touch') ? e.touches[0] : e;
        el.style.left = (p.clientX - dx) + 'px';
        el.style.top = (p.clientY - dy) + 'px';
    };
    const stop = () => {
        if (!dragging) return;
        dragging = false; el.style.zIndex = 5;
        checkMerge(el);
    };
    el.onmousedown = start; window.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
    el.ontouchstart = start; window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', stop);
}

function checkMerge(dragged) {
    const items = document.querySelectorAll('.item');
    items.forEach(other => {
        if (other === dragged) return;
        const dist = Math.hypot(dragged.offsetLeft - other.offsetLeft, dragged.offsetTop - other.offsetTop);
        if (dist < 80 && dragged.dataset.lvl === other.dataset.lvl) {
            const next = parseInt(dragged.dataset.lvl) + 1;
            if (next <= 50) {
                createItem(next, other.offsetLeft, other.offsetTop);
                if (next > maxLvl) maxLvl = next;
                if (next === 50 && ysdk) ysdk.adv.showFullscreenAdv();
                dragged.remove(); other.remove();
            }
        }
    });
}
</script>
</body>
</html>
