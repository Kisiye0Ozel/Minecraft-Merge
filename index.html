<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge World Pro</title>
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <style>
        /* Arka planı senin ayarlayabilmen için şeffaf bıraktım, body'e görsel ekleyebilirsin */
        body { 
            margin: 0; overflow: hidden; 
            background: #34495e; /* Burayı kendi görselinle değiştirebilirsin */
            font-family: 'Arial Rounded MT Bold', sans-serif; 
            user-select: none; touch-action: none; 
        }
        
        #game-canvas { width: 100vw; height: 100vh; position: relative; }

        /* Para Göstergesi ve Animasyonu */
        #ui-layer { 
            position: absolute; top: 20px; width: 100%; 
            display: flex; justify-content: center; pointer-events: none; 
        }
        #money-container {
            background: rgba(0,0,0,0.5); padding: 10px 30px; 
            border-radius: 50px; border: 3px solid gold;
            color: gold; font-size: 35px; transition: transform 0.2s;
        }
        .money-pump { transform: scale(1.3); color: #2ecc71 !important; }
        .money-drain { transform: scale(0.8); color: #e74c3c !important; }

        /* Market Butonu */
        #shop-layer { 
            position: absolute; bottom: 40px; width: 100%; 
            display: flex; justify-content: center; 
        }
        #buy-btn {
            width: 130px; height: 130px; 
            background: white url('assets/png1.png') no-repeat center;
            background-size: 70%; border: 6px solid #f1c40f; 
            border-radius: 35px; cursor: pointer; position: relative;
            box-shadow: 0 10px 0px #d4ac0d; transition: 0.1s;
        }
        #buy-btn:active { transform: translateY(5px); box-shadow: 0 5px 0px #d4ac0d; }
        #buy-btn:disabled { filter: grayscale(1); opacity: 0.5; }

        .price-tag {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            background: #27ae60; color: white; padding: 5px 20px;
            border-radius: 20px; border: 3px solid white; font-size: 22px;
        }

        /* OYUN OBJELERİ */
        .item {
            position: absolute; width: 120px; height: 120px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transform: translate(-50%, -50%); z-index: 5;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.4));
            transition: transform 0.1s ease-out;
        }
        .item-level {
            position: absolute; bottom: -5px; right: -5px;
            background: #e67e22; color: white; width: 40px; height: 40px;
            border-radius: 50%; border: 3px solid white;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold;
        }
        .dragging { z-index: 100 !important; transform: translate(-50%, -50%) scale(1.2); }

        /* Efektler */
        .particle {
            position: absolute; pointer-events: none; font-size: 30px;
            animation: float-out 0.8s ease-out forwards;
        }
        @keyframes float-out {
            to { transform: translate(var(--dx), var(--dy)) rotate(360deg) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-canvas">
    <div id="ui-layer">
        <div id="money-container">💰 <span id="money-val">150</span></div>
    </div>

    <div id="shop-layer">
        <button id="buy-btn">
            <div class="price-tag">25 💰</div>
        </button>
    </div>
</div>

<script>
let money = 150;
const canvas = document.getElementById('game-canvas');
const moneyVal = document.getElementById('money-val');
const moneyCont = document.getElementById('money-container');
const buyBtn = document.getElementById('buy-btn');

// --- PARA ANİMASYONU ---
function updateMoney(amount, type) {
    money += amount;
    moneyVal.innerText = Math.floor(money);
    
    const animClass = type === 'win' ? 'money-pump' : 'money-drain';
    moneyCont.classList.add(animClass);
    setTimeout(() => moneyCont.classList.remove(animClass), 250);
    
    buyBtn.disabled = money < 25;
}

// --- DOĞMA NOKTASI HESAPLAMA (Üst üste binmemesi için) ---
function getSafeSpawnPos() {
    let x, y, collision;
    let attempts = 0;
    do {
        collision = false;
        x = Math.random() * (window.innerWidth - 150) + 75;
        y = Math.random() * (window.innerHeight - 300) + 100;
        
        // Mevcut objelerle çakışma kontrolü
        document.querySelectorAll('.item').forEach(item => {
            const dx = item.offsetLeft - x;
            const dy = item.offsetTop - y;
            if (Math.hypot(dx, dy) < 130) collision = true;
        });
        attempts++;
    } while (collision && attempts < 20);
    return {x, y};
}

buyBtn.onclick = () => {
    if (money >= 25) {
        updateMoney(-25, 'lose');
        const pos = getSafeSpawnPos();
        createItem(1, pos.x, pos.y);
    }
};

function createItem(lvl, x, y) {
    const el = document.createElement('div');
    el.className = 'item';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.backgroundImage = `url('assets/png${lvl}.png')`;
    el.dataset.lvl = lvl;

    const levelTag = document.createElement('div');
    levelTag.className = 'item-level';
    levelTag.innerText = lvl;
    el.appendChild(levelTag);

    // Giriş Animasyonu
    el.style.transform = 'translate(-50%, -50%) scale(0)';
    setTimeout(() => el.style.transform = 'translate(-50%, -50%) scale(1)', 50);

    addDragLogic(el);
    canvas.appendChild(el);
}

function addDragLogic(el) {
    let dragging = false;
    let offset = {x: 0, y: 0};

    const start = (e) => {
        dragging = true;
        el.classList.add('dragging');
        const p = e.type.includes('touch') ? e.touches[0] : e;
        offset.x = p.clientX - el.offsetLeft;
        offset.y = p.clientY - el.offsetTop;
    };

    const move = (e) => {
        if (!dragging) return;
        const p = e.type.includes('touch') ? e.touches[0] : e;
        el.style.left = (p.clientX - offset.x) + 'px';
        el.style.top = (p.clientY - offset.y) + 'px';
    };

    const end = () => {
        if (!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
        checkCollision(el);
    };

    el.onmousedown = start;
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    el.ontouchstart = start;
    window.addEventListener('touchmove', move, {passive: false});
    window.addEventListener('touchend', end);
}

function checkCollision(dragged) {
    const items = document.querySelectorAll('.item');
    let merged = false;

    items.forEach(other => {
        if (other === dragged || merged) return;

        const dist = Math.hypot(dragged.offsetLeft - other.offsetLeft, dragged.offsetTop - other.offsetTop);

        // Birleşme mesafesi (120px obje için 100px ideal)
        if (dist < 100 && dragged.dataset.lvl === other.dataset.lvl) {
            const nextLvl = parseInt(dragged.dataset.lvl) + 1;
            if (nextLvl <= 50) {
                spawnParticles(other.offsetLeft, other.offsetTop);
                createItem(nextLvl, other.offsetLeft, other.offsetTop);
                dragged.remove();
                other.remove();
                updateMoney(nextLvl * 15, 'win');
                merged = true;
            }
        }
    });
}

function spawnParticles(x, y) {
    const icons = ['✨', '⭐', '🎈', '🎉'];
    for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = icons[Math.floor(Math.random() * icons.length)];
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        p.style.setProperty('--dx', (Math.random() - 0.5) * 300 + 'px');
        p.style.setProperty('--dy', (Math.random() - 0.5) * 300 + 'px');
        canvas.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}

updateMoney(0); // İlk kontrol
</script>
</body>
</html>
