<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge Master 50</title>
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #1a1a2e, #16213e); font-family: 'Arial', sans-serif; user-select: none; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: gold; font-size: 28px; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
        
        /* Yeni Görsel Buton Tasarımı */
        #buy-container {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); display: flex; flex-direction: column;
            align-items: center; z-index: 10;
        }
        #buy-btn {
            width: 90px; height: 90px;
            background: rgba(255, 255, 255, 0.1) url('assets/png1.png') no-repeat center;
            background-size: 70%; border: 4px solid #e94560; border-radius: 25px;
            cursor: pointer; position: relative; transition: 0.2s;
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.5);
        }
        #buy-btn:disabled { filter: grayscale(1); opacity: 0.7; cursor: not-allowed; }
        
        .price-tag {
            position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
            background: #ffd700; color: #1a1a2e; padding: 4px 12px;
            border-radius: 12px; font-weight: bold; font-size: 18px;
            border: 2px solid #1a1a2e;
        }

        .item {
            position: absolute; width: 80px; height: 80px; cursor: grab;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translate(-50%, -50%); z-index: 1;
        }
        .item.dragging { transform: translate(-50%, -50%) scale(1.2); z-index: 100; cursor: grabbing; }

        .particle {
            position: absolute; width: 10px; height: 10px; border-radius: 50%;
            pointer-events: none; animation: explode 0.6s ease-out forwards;
        }
        @keyframes explode {
            to { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">Para: <span id="money-text">150</span> 💰</div>
    
    <div id="buy-container">
        <button id="buy-btn">
            <div class="price-tag">25 💰</div>
        </button>
    </div>
</div>

<script>
let money = 150;
const container = document.getElementById('game-container');
const moneyText = document.getElementById('money-text');
const buyBtn = document.getElementById('buy-btn');

function updateUI() {
    moneyText.innerText = Math.floor(money);
    buyBtn.disabled = money < 25;
}

buyBtn.addEventListener('click', () => {
    if (money >= 25) {
        money -= 25;
        updateUI();
        const x = Math.random() * (window.innerWidth - 100) + 50;
        const y = Math.random() * (window.innerHeight - 250) + 100;
        createItem(1, x, y);
    }
});

function createItem(level, x, y) {
    const item = document.createElement('div');
    item.className = 'item';
    item.dataset.level = level;
    item.style.left = x + 'px';
    item.style.top = y + 'px';
    item.style.backgroundImage = `url('assets/png${level}.png')`;
    
    // Doğma animasyonu
    item.style.transform = 'translate(-50%, -50%) scale(0)';
    setTimeout(() => { item.style.transform = 'translate(-50%, -50%) scale(1)'; }, 10);

    makeDraggable(item);
    container.appendChild(item);
}

function makeDraggable(el) {
    let isDragging = false;
    let offset = { x: 0, y: 0 };

    const start = (e) => {
        isDragging = true;
        el.classList.add('dragging');
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        offset.x = clientX - el.offsetLeft;
        offset.y = clientY - el.offsetTop;
    };

    const move = (e) => {
        if (!isDragging) return;
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        el.style.left = (clientX - offset.x) + 'px';
        el.style.top = (clientY - offset.y) + 'px';
    };

    const stop = () => {
        if (!isDragging) return;
        isDragging = false;
        el.classList.remove('dragging');
        checkMerge(el);
    };

    el.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    el.addEventListener('touchstart', start, {passive: false});
    window.addEventListener('touchmove', move, {passive: false});
    window.addEventListener('touchend', stop);
}

function checkMerge(draggedItem) {
    const items = document.querySelectorAll('.item');
    const dRect = draggedItem.getBoundingClientRect();

    items.forEach(other => {
        if (other === draggedItem) return;
        const oRect = other.getBoundingClientRect();
        const dist = Math.hypot(dRect.x - oRect.x, dRect.y - oRect.y);

        if (dist < 60 && draggedItem.dataset.level === other.dataset.level) {
            const nextLevel = parseInt(draggedItem.dataset.level) + 1;
            if (nextLevel <= 50) {
                createExplosion(oRect.x + 40, oRect.y + 40);
                createItem(nextLevel, oRect.x + 40, oRect.y + 40);
                draggedItem.remove();
                other.remove();
                money += nextLevel * 12;
                updateUI();
            }
        }
    });
}

function createExplosion(x, y) {
    for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        p.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
        p.style.setProperty('--dx', (Math.random() - 0.5) * 150 + 'px');
        p.style.setProperty('--dy', (Math.random() - 0.5) * 150 + 'px');
        container.appendChild(p);
        setTimeout(() => p.remove(), 600);
    }
}

updateUI();
</script>
</body>
</html>
