<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge Tycoon: Reklam Ödüllü</title>
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <style>
        :root { --neon-blue: #00f2fe; --neon-pink: #ff007f; --gold: #f1c40f; }
        body { margin: 0; overflow: hidden; background: #0b0e14; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; color: white; }
        #game-canvas { width: 100vw; height: 100vh; position: relative; }

        /* UI Panelleri */
        #ui-top {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(20, 20, 35, 0.9); backdrop-filter: blur(10px);
            border: 2px solid var(--neon-blue); border-radius: 20px;
            padding: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100;
        }

        /* Market Alanı */
        #shop-container {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; gap: 15px; z-index: 100;
        }

        .shop-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }

        .buy-btn {
            width: 85px; height: 85px; background: #fff no-repeat center;
            background-size: 65%; border: none; border-radius: 20px;
            cursor: pointer; position: relative; transition: 0.2s;
        }

        /* ÖZEL REKLAM BUTONU */
        #ad-reward-btn {
            width: 85px; height: 85px;
            background: linear-gradient(45deg, #f1c40f, #e67e22);
            border: 3px solid white; border-radius: 20px;
            cursor: pointer; font-size: 40px; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.6);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .price-tag { background: #27ae60; color: white; padding: 3px 8px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .ad-tag { background: #e74c3c; color: white; padding: 3px 8px; border-radius: 8px; font-weight: bold; font-size: 12px; }

        /* Objeler */
        .item { position: absolute; width: 100px; height: 100px; background-size: contain; background-repeat: no-repeat; background-position: center; transform: translate(-50%, -50%); z-index: 5; }
        .item-lvl { position: absolute; top: -5px; right: -5px; background: var(--neon-blue); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid white; font-size: 14px; }
    </style>
</head>
<body>

<div id="game-canvas">
    <div id="ui-top">
        <div style="font-size: 28px; color: var(--gold);">💰 <span id="m-val">150</span></div>
        <div id="i-val" style="color: #2ecc71; font-size: 14px;">Kazanç: +0/sn</div>
    </div>

    <div id="shop-container">
        <div class="shop-item">
            <button id="btn-lvl1" class="buy-btn" onclick="buy(1, 25)" style="background-image: url('assets/png1.png')">
                <div class="price-tag">25 💰</div>
            </button>
        </div>

        <div class="shop-item">
            <button id="ad-reward-btn" onclick="watchAdForGift()">📺</button>
            <div class="ad-tag">HEDİYE</div>
        </div>
    </div>
</div>

<script>
let money = 150;
let maxLvl = 1;
let ysdk = null;

const sndBuy = new Audio('assets/buy.mp3');
const sndMerge = new Audio('assets/merge.mp3');

YaGames.init().then(sdk => { ysdk = sdk; });

// --- REKLAM İZLEME FONKSİYONU ---
function watchAdForGift() {
    if (!ysdk) {
        alert("Reklam henüz hazır değil!");
        return;
    }

    ysdk.adv.showRewardedVideo({
        callbacks: {
            onOpen: () => { console.log('Reklam başladı.'); },
            onRewarded: () => {
                // ÖDÜL: En yüksek seviyenin bir altını (veya en az 2) ver
                let giftLvl = Math.max(2, maxLvl - 1);
                createItem(giftLvl, window.innerWidth/2, 100); // Gökten düşsün
                alert("Tebrikler! Seviye " + giftLvl + " kazandın!");
            },
            onClose: () => { console.log('Reklam kapandı.'); },
            onError: (e) => { console.error('Hata:', e); }
        }
    });
}

// --- GELİR DÖNGÜSÜ ---
setInterval(() => {
    let income = 0;
    document.querySelectorAll('.item').forEach(item => {
        income += Math.pow(parseInt(item.dataset.lvl), 1.6);
    });
    money += Math.floor(income);
    document.getElementById('m-val').innerText = Math.floor(money);
    document.getElementById('i-val').innerText = "Kazanç: +" + Math.floor(income) + "/sn";
    document.getElementById('btn-lvl1').disabled = (money < 25);
}, 1000);

function buy(lvl, cost) {
    if (money >= cost) {
        money -= cost;
        sndBuy.play().catch(()=>{});
        createItem(lvl, window.innerWidth/2, window.innerHeight/2);
    }
}

function createItem(lvl, x, y) {
    const el = document.createElement('div');
    el.className = 'item';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.style.backgroundImage = `url('assets/png${lvl}.png')`;
    el.dataset.lvl = lvl;

    const tag = document.createElement('div');
    tag.className = 'item-lvl'; tag.innerText = lvl;
    el.appendChild(tag);
    
    // Gökten düşme efekti (Eğer yukarıdan doğuyorsa)
    if(y < 200) {
        el.style.transition = "top 0.5s bounce";
        setTimeout(() => el.style.top = (window.innerHeight/2) + "px", 10);
    }

    makeDraggable(el);
    document.getElementById('game-canvas').appendChild(el);
}

function makeDraggable(el) {
    let dx = 0, dy = 0, dragging = false;
    const start = (e) => {
        dragging = true; el.style.zIndex = 1000;
        const p = e.type.includes('touch') ? e.touches[0] : e;
        dx = p.clientX - el.offsetLeft; dy = p.clientY - el.offsetTop;
    };
    const move = (e) => {
        if (!dragging) return;
        const p = e.type.includes('touch') ? e.touches[0] : e;
        el.style.left = (p.clientX - dx) + 'px';
        el.style.top = (p.clientY - dy) + 'px';
    };
    const stop = () => {
        if (!dragging) return;
        dragging = false; el.style.zIndex = 5;
        checkMerge(el);
    };
    el.onmousedown = start; window.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
    el.ontouchstart = start; window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', stop);
}

function checkMerge(dragged) {
    const items = document.querySelectorAll('.item');
    items.forEach(other => {
        if (other === dragged) return;
        const dist = Math.hypot(dragged.offsetLeft - other.offsetLeft, dragged.offsetTop - other.offsetTop);
        if (dist < 80 && dragged.dataset.lvl === other.dataset.lvl) {
            const next = parseInt(dragged.dataset.lvl) + 1;
            if (next <= 50) {
                sndMerge.play().catch(()=>{});
                createItem(next, other.offsetLeft, other.offsetTop);
                if (next > maxLvl) maxLvl = next;
                dragged.remove(); other.remove();
            }
        }
    });
}
</script>
</body>
</html>
