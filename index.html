<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Merge Tycoon 2026</title>
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-pink: #ff007f;
            --gold: #f1c40f;
            --mc-green: #3ff23f;
            --panel-bg: rgba(15, 15, 25, 0.9);
        }

        body { margin: 0; overflow: hidden; background: #050508; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; touch-action: none; color: white; }

        /* --- MINECRAFT YÜKLEME EKRANI --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        #mc-logo { font-size: 30px; font-weight: bold; color: #fff; text-shadow: 4px 4px #000; letter-spacing: 2px; margin-bottom: 20px; }
        .pixel-border { width: 250px; height: 30px; border: 4px solid #fff; padding: 2px; background: #000; }
        #progress-bar { width: 0%; height: 100%; background: var(--mc-green); box-shadow: 0 0 10px var(--mc-green); }

        /* --- ANA UI --- */
        #game-canvas { width: 100vw; height: 100vh; position: relative; background: radial-gradient(circle, #1b2735 0%, #050508 100%); }

        #ui-top {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; background: var(--panel-bg); backdrop-filter: blur(15px);
            border: 2px solid var(--neon-blue); border-radius: 20px; padding: 12px;
            display: flex; flex-direction: column; align-items: center; z-index: 100;
        }
        #money-display { font-size: 34px; color: var(--gold); font-weight: bold; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        #income-display { font-size: 14px; color: var(--neon-blue); text-transform: uppercase; margin-top: 4px; }

        /* SIRADAKİ HEDEF */
        #next-target {
            position: absolute; top: 20px; right: 20px; width: 80px; height: 100px;
            background: var(--panel-bg); border: 2px solid var(--neon-pink); border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 90;
        }
        #target-img { width: 50px; height: 50px; background-size: contain; background-repeat: no-repeat; filter: brightness(0) invert(1); opacity: 0.3; }

        /* DİL BUTONU VE MENÜSÜ */
        #lang-btn { position: absolute; bottom: 25px; left: 25px; font-size: 35px; cursor: pointer; z-index: 1000; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        #lang-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px; }
        .flag-box { text-align: center; cursor: pointer; }
        .flag-box img { width: 70px; border: 3px solid white; border-radius: 10px; transition: 0.2s; }
        .flag-box img:active { transform: scale(0.9); }

        /* MARKET SİSTEMİ */
        #shop { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; }
        .buy-card { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-main {
            width: 90px; height: 90px; background: #fff no-repeat center; background-size: 65%;
            border: none; border-radius: 20px; cursor: pointer; position: relative;
            box-shadow: 0 0 15px rgba(255,255,255,0.1); transition: 0.2s;
        }
        .btn-ad { background: linear-gradient(45deg, #f1c40f, #e67e22); font-size: 40px; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-main:active { transform: scale(0.9); }
        .btn-main:disabled { filter: grayscale(1); opacity: 0.4; }
        .price-label { background: #27ae60; color: white; padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 14px; }

        /* OBJELER VE EFEKTLER */
        .item { position: absolute; width: 110px; height: 110px; background-size: contain; background-repeat: no-repeat; background-position: center; transform: translate(-50%, -50%); transition: filter 0.3s; }
        .item-lvl { position: absolute; top: -10px; right: -10px; background: var(--neon-blue); color: #000; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }
        
        .particle { position: absolute; pointer-events: none; animation: part 0.8s forwards; font-size: 25px; }
        @keyframes part { to { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div id="mc-logo">MINECRAFT MERGE</div>
    <div class="pixel-border"><div id="progress-bar"></div></div>
</div>

<div id="lang-menu">
    <h1 id="txt-select">DİL SEÇİN / SELECT LANGUAGE</h1>
    <div class="lang-grid">
        <div class="flag-box" onclick="changeLang('tr')"><img src="https://flagcdn.com/w160/tr.png"><p>Türkçe</p></div>
        <div class="flag-box" onclick="changeLang('en')"><img src="https://flagcdn.com/w160/us.png"><p>English</p></div>
        <div class="flag-box" onclick="changeLang('ru')"><img src="https://flagcdn.com/w160/ru.png"><p>Русский</p></div>
        <div class="flag-box" onclick="changeLang('de')"><img src="https://flagcdn.com/w160/de.png"><p>Deutsch</p></div>
    </div>
    <button onclick="toggleLang()" style="padding:10px 40px; background:var(--neon-pink); border:none; color:white; border-radius:10px; cursor:pointer;">X</button>
</div>

<div id="game-canvas">
    <div id="lang-btn" onclick="toggleLang()">🌐</div>

    <div id="ui-top">
        <div id="money-display">💰 <span id="m-val">150</span></div>
        <div id="income-display">GELİR: +0/sn</div>
    </div>

    <div id="next-target">
        <div id="target-img"></div>
        <div id="target-lvl" style="font-size:12px; color:var(--neon-pink); font-weight:bold; margin-top:5px;">LVL 2</div>
    </div>

    <div id="shop">
        <div class="buy-card">
            <button id="buy-lvl1" class="btn-main" onclick="buyItem(1, 25)" style="background-image:url('assets/png1.png')">
                <div class="price-label">25 💰</div>
            </button>
            <span style="font-size:10px">PNG 1</span>
        </div>
        
        <div id="dynamic-slot" class="buy-card" style="display:none;">
            <button id="buy-dynamic" class="btn-main">
                <div id="dyn-price" class="price-label">75 💰</div>
            </button>
            <span id="dyn-txt" style="font-size:10px">PNG 2</span>
        </div>

        <div class="buy-card">
            <button class="btn-main btn-ad" onclick="watchRewarded()">📺</button>
            <span id="txt-gift" style="font-size:10px">HEDİYE</span>
        </div>
    </div>
</div>

<script>
// --- VERİLER VE DİLLER ---
const dict = {
    tr: { inc: "GELİR", sel: "DİL SEÇİN", gift: "HEDİYE", win: "TEBRİKLER!", reach: "PNG 50'YE ULAŞTIN!" },
    en: { inc: "INCOME", sel: "SELECT LANGUAGE", gift: "GIFT", win: "CONGRATS!", reach: "YOU REACHED PNG 50!" },
    ru: { inc: "ДОХОД", sel: "ВЫБЕРИТЕ ЯЗЫК", gift: "ПОДАРОК", win: "ПОЗДРАВЛЯЕМ!", reach: "ВЫ ДОСТИГЛИ PNG 50!" },
    de: { inc: "EINKOMMEN", sel: "SPRACHE WÄHLEN", gift: "GESCHENK", win: "GLÜCKWUNSCH!", reach: "PNG 50 ERREICHT!" }
};

let lang = 'tr';
let money = 150;
let lastAdMoney = 150;
let maxLvl = 1;
let ysdk = null;
let audioInit = false;

const sndBuy = new Audio('assets/buy.mp3');
const sndMerge = new Audio('assets/merge.mp3');

// --- YÜKLEME SİMÜLASYONU ---
let prg = 0;
const loader = setInterval(() => {
    prg += Math.random() * 20;
    document.getElementById('progress-bar').style.width = Math.min(prg, 100) + "%";
    if(prg >= 100) {
        clearInterval(loader);
        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 600);
    }
}, 250);

// --- YANDEX SDK ---
YaGames.init().then(sdk => { ysdk = sdk; });

// --- ANA DÖNGÜ (Tycoon Ekonomi) ---
setInterval(() => {
    let income = 0;
    document.querySelectorAll('.item').forEach(el => {
        let l = parseInt(el.dataset.lvl);
        income += Math.floor(Math.pow(l, 1.7)); // Üssel kazanç artışı
    });
    money += income;
    updateUI(income);
    if(money - lastAdMoney >= 250) { lastAdMoney = money; showInterstitial(); }
}, 1000);

function updateUI(incVal = 0) {
    document.getElementById('m-val').innerText = Math.floor(money);
    document.getElementById('income-display').innerText = `${dict[lang].inc}: +${incVal}/sn`;
    document.getElementById('txt-gift').innerText = dict[lang].gift;
    document.getElementById('txt-select').innerText = dict[lang].sel;

    // Hedef Paneli
    const next = maxLvl + 1;
    if(next <= 50) {
        document.getElementById('target-img').style.backgroundImage = `url('assets/png${next}.png')`;
        document.getElementById('target-lvl').innerText = "LVL " + next;
    }

    // Dinamik Market (Üşenler için PNG2+ sistemi)
    const dynSlot = document.getElementById('dynamic-slot');
    if(maxLvl >= 4) {
        dynSlot.style.display = 'flex';
        let sellLvl = maxLvl - 2;
        let price = Math.floor(25 * Math.pow(3, sellLvl));
        const btn = document.getElementById('buy-dynamic');
        btn.style.backgroundImage = `url('assets/png${sellLvl}.png')`;
        btn.disabled = money < price;
        btn.onclick = () => buyItem(sellLvl, price);
        document.getElementById('dyn-price').innerText = price + " 💰";
        document.getElementById('dyn-txt').innerText = "PNG " + sellLvl;
    }
}

// --- AKSİYONLAR ---
function toggleLang() {
    const m = document.getElementById('lang-menu');
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
}

function changeLang(l) { lang = l; updateUI(); toggleLang(); }

function buyItem(lvl, cost) {
    if(!audioInit) { sndBuy.play(); audioInit = true; }
    if(money >= cost) {
        money -= cost;
        sndBuy.play().catch(()=>{});
        createItem(lvl, window.innerWidth/2, window.innerHeight/2);
        updateUI();
    }
}

function createItem(lvl, x, y) {
    const el = document.createElement('div');
    el.className = 'item';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.style.backgroundImage = `url('assets/png${lvl}.png')`;
    el.dataset.lvl = lvl;

    // DİNAMİK AURA RENKLERİ
    const colors = ["#fff", "#0f0", "#0af", "#f0f", "#ff0", "#f44"];
    const glow = colors[Math.min(Math.floor(lvl/8), colors.length-1)];
    el.style.filter = `drop-shadow(0 0 12px ${glow})`;

    const tag = document.createElement('div');
    tag.className = 'item-lvl'; tag.innerText = lvl;
    el.appendChild(tag);

    makeDraggable(el);
    document.getElementById('game-canvas').appendChild(el);
}

function makeDraggable(el) {
    let dx=0, dy=0, drg=false;
    const s = (e) => {
        drg=true; el.style.zIndex=1000;
        const p = e.type.includes('touch')?e.touches[0]:e;
        dx=p.clientX-el.offsetLeft; dy=p.clientY-el.offsetTop;
    };
    const m = (e) => {
        if(!drg)return;
        const p = e.type.includes('touch')?e.touches[0]:e;
        el.style.left=(p.clientX-dx)+'px'; el.style.top=(p.clientY-dy)+'px';
    };
    const st = () => { if(drg){drg=false; el.style.zIndex=5; checkMerge(el);} };
    el.onmousedown=s; window.addEventListener('mousemove',m); window.addEventListener('mouseup',st);
    el.ontouchstart=s; window.addEventListener('touchmove',m,{passive:false}); window.addEventListener('touchend',st);
}

function checkMerge(dragged) {
    const items = document.querySelectorAll('.item');
    items.forEach(other => {
        if(other === dragged) return;
        const d = Math.hypot(dragged.offsetLeft-other.offsetLeft, dragged.offsetTop-other.offsetTop);
        if(d < 80 && dragged.dataset.lvl === other.dataset.lvl) {
            const next = parseInt(dragged.dataset.lvl) + 1;
            if(next <= 50) {
                sndMerge.play().catch(()=>{});
                spawnParts(other.offsetLeft, other.offsetTop);
                createItem(next, other.offsetLeft, other.offsetTop);
                if(next > maxLvl) { maxLvl = next; if(next === 50) showInterstitial(); }
                dragged.remove(); other.remove();
                updateUI();
            }
        }
    });
}

function spawnParts(x,y) {
    const emojis = ['✨','⭐','💥','💎'];
    for(let i=0; i<10; i++) {
        const p = document.createElement('div');
        p.className='particle'; p.innerText=emojis[Math.floor(Math.random()*4)];
        p.style.left=x+'px'; p.style.top=y+'px';
        p.style.setProperty('--dx', (Math.random()-0.5)*300+'px');
        p.style.setProperty('--dy', (Math.random()-0.5)*300+'px');
        document.body.appendChild(p);
        setTimeout(()=>p.remove(), 800);
    }
}

// --- REKLAMLAR ---
function showInterstitial() {
    if(ysdk) ysdk.adv.showFullscreenAdv();
}

function watchRewarded() {
    if(ysdk) {
        ysdk.adv.showRewardedVideo({
            callbacks: {
                onRewarded: () => {
                    let g = Math.max(1, maxLvl - 1);
                    createItem(g, window.innerWidth/2, 100);
                    alert(dict[lang].gift);
                }
            }
        });
    }
}
</script>
</body>
</html>
