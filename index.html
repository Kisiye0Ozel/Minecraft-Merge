<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge Tycoon: Infinite</title>
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <style>
        :root { --n-blue: #00f2fe; --n-pink: #ff007f; --gold: #f1c40f; --bg: #0d0d12; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; color: white; }
        
        #game-canvas { width: 100vw; height: 100vh; position: relative; background: radial-gradient(circle, #161b22 0%, #050508 100%); }

        /* Üst Panel */
        #ui-top {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0,0,0,0.8); border: 2px solid var(--n-blue);
            border-radius: 15px; padding: 10px; text-align: center; z-index: 100;
        }
        #money-display { font-size: 32px; color: var(--gold); font-weight: bold; }
        #turbo-timer { font-size: 12px; color: var(--n-pink); display: none; margin-top: 5px; }

        /* Market */
        #shop { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; }
        .shop-card { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .buy-btn {
            width: 85px; height: 85px; background: #fff no-repeat center; background-size: 65%;
            border: 3px solid #444; border-radius: 18px; cursor: pointer; position: relative;
            transition: 0.1s; box-shadow: 0 4px 0 #222;
        }
        .buy-btn:active { transform: translateY(4px); box-shadow: none; }
        .buy-btn:disabled { filter: grayscale(1); opacity: 0.5; cursor: default; }
        .price-tag { background: #27ae60; color: white; padding: 2px 8px; border-radius: 6px; font-weight: bold; font-size: 13px; }

        /* Alt Araçlar */
        #tools { position: absolute; bottom: 25px; left: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .tool-btn { width: 55px; height: 55px; background: rgba(0,0,0,0.7); border: 2px solid var(--n-blue); border-radius: 50%; font-size: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Objeler */
        .item { position: absolute; width: 100px; height: 100px; background-size: contain; background-repeat: no-repeat; background-position: center; transform: translate(-50%, -50%); cursor: grab; }
        .item:active { cursor: grabbing; }
        .item-lvl { position: absolute; top: -5px; right: -5px; background: #000; color: #fff; border: 2px solid var(--n-blue); padding: 2px 6px; border-radius: 6px; font-size: 12px; font-weight: bold; }

        /* Animasyonlar */
        @keyframes float { 0% { transform: translate(-50%, -55%); } 100% { transform: translate(-50%, -45%); } }
        .turbo-active { animation: glow 1s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px var(--gold); } to { box-shadow: 0 0 20px var(--gold); } }
    </style>
</head>
<body>

<div id="game-canvas">
    <div id="ui-top">
        <div id="money-display">💰 <span id="m-val">0</span></div>
        <div id="turbo-timer">🔥 TURBO MOD: <span id="t-val">0</span>s</div>
    </div>

    <div id="tools">
        <div class="tool-btn" onclick="toggleLang()">🌐</div>
        <div class="tool-btn" onclick="saveGame()">💾</div>
    </div>

    <div id="shop">
        <div class="shop-card">
            <button id="btn-1" class="buy-btn" onclick="buy(1)" style="background-image:url('assets/png1.png')">
                <div id="p-1" class="price-tag">25</div>
            </button>
            <span style="font-size:10px">PNG 1</span>
        </div>
        <div id="dyn-slot" class="shop-card" style="display:none">
            <button id="btn-dyn" class="buy-btn">
                <div id="p-dyn" class="price-tag">0</div>
            </button>
            <span id="txt-dyn" style="font-size:10px">PNG ?</span>
        </div>
        <div class="shop-card">
            <button class="buy-btn" style="background: var(--gold); font-size: 35px;" onclick="watchTurbo()">⚡</button>
            <span style="font-size:10px">2X HIZ</span>
        </div>
    </div>
</div>

<script>
let money = 150;
let maxLvl = 1;
let turboTime = 0;
let ysdk = null;

// Fiyat Formülü (Daha yumuşak: 25 * 2.2^seviye)
const getPrice = (lvl) => Math.floor(25 * Math.pow(2.2, lvl - 1));

YaGames.init().then(sdk => { ysdk = sdk; loadGame(); });

// --- EKONOMİ DÖNGÜSÜ ---
setInterval(() => {
    let inc = 0;
    document.querySelectorAll('.item').forEach(i => {
        inc += Math.pow(parseInt(i.dataset.lvl), 1.6);
    });
    
    if (turboTime > 0) {
        inc *= 2;
        turboTime--;
        document.getElementById('turbo-timer').style.display = 'block';
        document.getElementById('t-val').innerText = turboTime;
        document.getElementById('ui-top').classList.add('turbo-active');
    } else {
        document.getElementById('turbo-timer').style.display = 'none';
        document.getElementById('ui-top').classList.remove('turbo-active');
    }

    money += Math.floor(inc);
    updateUI();
    if(Math.random() < 0.05) saveGame(); // Arada bir oto-save
}, 1000);

function updateUI() {
    document.getElementById('m-val').innerText = Math.floor(money);
    document.getElementById('btn-1').disabled = (money < 25);
    
    if (maxLvl >= 3) {
        let dLvl = maxLvl - 2;
        let dPrice = getPrice(dLvl) * 2; // Direkt alma vergisi %100
        document.getElementById('dyn-slot').style.display = 'flex';
        document.getElementById('btn-dyn').style.backgroundImage = `url('assets/png${dLvl}.png')`;
        document.getElementById('p-dyn').innerText = dPrice;
        document.getElementById('txt-dyn').innerText = "PNG " + dLvl;
        document.getElementById('btn-dyn').onclick = () => { if(money >= dPrice) { money -= dPrice; createItem(dLvl, innerWidth/2, innerHeight/2); } };
        document.getElementById('btn-dyn').disabled = (money < dPrice);
    }
}

function buy(lvl) {
    let cost = getPrice(lvl);
    if(money >= cost) {
        money -= cost;
        createItem(lvl, innerWidth/2, innerHeight/2);
        updateUI();
    }
}

function createItem(lvl, x, y) {
    const el = document.createElement('div');
    el.className = 'item';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.style.backgroundImage = `url('assets/png${lvl}.png')`;
    el.dataset.lvl = lvl;
    el.innerHTML = `<div class="item-lvl">${lvl}</div>`;
    
    // Işık efekti
    const colors = ["#fff", "#0f0", "#0af", "#f0f", "#ff0", "#f44"];
    el.style.filter = `drop-shadow(0 0 10px ${colors[lvl%6]})`;

    makeDraggable(el);
    document.getElementById('game-canvas').appendChild(el);
}

function makeDraggable(el) {
    let dx, dy, drg = false;
    const start = (e) => {
        drg = true; el.style.zIndex = 1000;
        let p = e.type.includes('touch') ? e.touches[0] : e;
        dx = p.clientX - el.offsetLeft; dy = p.clientY - el.offsetTop;
    };
    const move = (e) => {
        if (!drg) return;
        let p = e.type.includes('touch') ? e.touches[0] : e;
        el.style.left = (p.clientX - dx) + 'px';
        el.style.top = (p.clientY - dy) + 'px';
    };
    const stop = () => {
        if (!drg) return;
        drg = false; el.style.zIndex = 5;
        checkMerge(el);
    };
    el.onmousedown = start; window.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
    el.ontouchstart = start; window.addEventListener('touchmove', move); window.addEventListener('touchend', stop);
}

function checkMerge(dragged) {
    const items = document.querySelectorAll('.item');
    items.forEach(other => {
        if (other === dragged) return;
        const d = Math.hypot(dragged.offsetLeft - other.offsetLeft, dragged.offsetTop - other.offsetTop);
        if (d < 70 && dragged.dataset.lvl === other.dataset.lvl) {
            const next = parseInt(dragged.dataset.lvl) + 1;
            createItem(next, other.offsetLeft, other.offsetTop);
            if(next > maxLvl) maxLvl = next;
            dragged.remove(); other.remove();
            updateUI();
        }
    });
}

// --- SAVE / LOAD SİSTEMİ ---
function saveGame() {
    const items = [];
    document.querySelectorAll('.item').forEach(i => items.push({l: i.dataset.lvl, x: i.style.left, y: i.style.top}));
    const data = { money, maxLvl, items };
    localStorage.setItem('merge_save', JSON.stringify(data));
}

function loadGame() {
    const saved = localStorage.getItem('merge_save');
    if (saved) {
        const data = JSON.parse(saved);
        money = data.money;
        maxLvl = data.maxLvl;
        data.items.forEach(i => createItem(i.l, parseInt(i.x), parseInt(i.y)));
        updateUI();
    }
}

// --- REKLAM: TURBO MOD ---
function watchTurbo() {
    if(ysdk) {
        ysdk.adv.showRewardedVideo({
            callbacks: { onRewarded: () => { turboTime += 120; } }
        });
    } else {
        turboTime += 30; // Dev modunda 30 saniye ver
    }
}
</script>
</body>
</html>
