<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge Tycoon 2026</title>
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: 'Arial Rounded MT Bold', sans-serif; user-select: none; touch-action: none; }
        #game-canvas { width: 100vw; height: 100vh; position: relative; }

        /* Üst Panel: Para ve Kazanç */
        #ui-top { 
            position: absolute; top: 20px; width: 100%; 
            display: flex; flex-direction: column; align-items: center; pointer-events: none; 
        }
        #money-display { font-size: 40px; color: gold; text-shadow: 2px 2px #000; }
        #income-display { font-size: 20px; color: #2ecc71; text-shadow: 1px 1px #000; margin-top: 5px; }

        /* Market Alanı */
        #shop-layer { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; }
        #buy-btn {
            width: 120px; height: 120px; background: white url('assets/png1.png') no-repeat center;
            background-size: 70%; border: 6px solid #f1c40f; border-radius: 30px;
            cursor: pointer; position: relative; box-shadow: 0 8px 0px #d4ac0d; transition: 0.1s;
        }
        #buy-btn:active { transform: translateY(4px); box-shadow: 0 4px 0px #d4ac0d; }
        #buy-btn:disabled { filter: grayscale(1); opacity: 0.5; }
        .price-tag { position: absolute; top: -20px; background: #27ae60; color: white; padding: 4px 15px; border-radius: 15px; border: 2px solid white; font-size: 18px; }

        /* Objeler */
        .item {
            position: absolute; width: 110px; height: 110px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transform: translate(-50%, -50%); z-index: 5; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }
        .item-lvl {
            position: absolute; bottom: -5px; right: -5px; background: #e67e22; color: white;
            width: 35px; height: 35px; border-radius: 50%; border: 3px solid white;
            display: flex; justify-content: center; align-items: center; font-weight: bold;
        }
        .dragging { z-index: 100; transform: translate(-50%, -50%) scale(1.15); }
    </style>
</head>
<body>

<div id="game-canvas">
    <div id="ui-top">
        <div id="money-display">💰 <span id="m-val">150</span></div>
        <div id="income-display">Saniyelik Kazanç: +<span id="i-val">0</span> 💰</div>
    </div>

    <div id="shop-layer">
        <button id="buy-btn"><div class="price-tag">25 💰</div></button>
    </div>
</div>

<script>
let money = 150;
let lastAdMoney = 150; // Reklam takibi için
let totalIncome = 0;
let ysdk = null;

// Sesler
const sndBuy = new Audio('assets/buy.mp3');
const sndMerge = new Audio('assets/merge.mp3');

// Yandex SDK
YaGames.init().then(sdk => { ysdk = sdk; });

// --- GELİR SİSTEMİ (Saniyelik) ---
setInterval(() => {
    let income = 0;
    const items = document.querySelectorAll('.item');
    items.forEach(item => {
        // Formül: Level 1 = 1 para, Level 2 = 2 para... ya da üssel yapabilirsin
        income += parseInt(item.dataset.lvl); 
    });
    
    totalIncome = income;
    document.getElementById('i-val').innerText = totalIncome;
    
    if (totalIncome > 0) {
        money += totalIncome;
        updateUI();
        checkAdThreshold();
    }
}, 1000);

function updateUI() {
    document.getElementById('m-val').innerText = Math.floor(money);
    document.getElementById('buy-btn').disabled = money < 25;
}

// --- REKLAM KONTROLÜ (Her 250 parada bir) ---
function checkAdThreshold() {
    if (money - lastAdMoney >= 250) {
        lastAdMoney = money;
        showInterstitial();
    }
}

function showInterstitial() {
    if (ysdk) {
        ysdk.adv.showFullscreenAdv({
            callbacks: {
                onOpen: () => { /* Oyunu duraklatabilirsin */ },
                onClose: () => { console.log("Reklam bitti, devam!"); }
            }
        });
    }
}

// --- SATIN ALMA ---
document.getElementById('buy-btn').onclick = () => {
    if (money >= 25) {
        money -= 25;
        sndBuy.play();
        updateUI();
        createItem(1, window.innerWidth/2, window.innerHeight/2);
    }
};

function createItem(lvl, x, y) {
    const el = document.createElement('div');
    el.className = 'item';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.style.backgroundImage = `url('assets/png${lvl}.png')`;
    el.dataset.lvl = lvl;

    const tag = document.createElement('div');
    tag.className = 'item-lvl'; tag.innerText = lvl;
    el.appendChild(tag);

    addDrag(el);
    document.getElementById('game-canvas').appendChild(el);
}

function addDrag(el) {
    let dx = 0, dy = 0, dragging = false;
    
    const move = (e) => {
        if (!dragging) return;
        const p = e.type.includes('touch') ? e.touches[0] : e;
        el.style.left = (p.clientX - dx) + 'px';
        el.style.top = (p.clientY - dy) + 'px';
    };

    const stop = () => {
        dragging = false;
        el.classList.remove('dragging');
        checkMerge(el);
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', stop);
    };

    el.onmousedown = (e) => {
        dragging = true;
        el.classList.add('dragging');
        dx = e.clientX - el.offsetLeft;
        dy = e.clientY - el.offsetTop;
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
    };

    // Mobil için aynı mantık
    el.ontouchstart = (e) => {
        dragging = true;
        el.classList.add('dragging');
        dx = e.touches[0].clientX - el.offsetLeft;
        dy = e.touches[0].clientY - el.offsetTop;
        window.addEventListener('touchmove', move, {passive:false});
        window.addEventListener('touchend', stop);
    };
}

function checkMerge(dragged) {
    const items = document.querySelectorAll('.item');
    items.forEach(other => {
        if (other === dragged) return;
        const dist = Math.hypot(dragged.offsetLeft - other.offsetLeft, dragged.offsetTop - other.offsetTop);
        
        if (dist < 80 && dragged.dataset.lvl === other.dataset.lvl) {
            const next = parseInt(dragged.dataset.lvl) + 1;
            if (next <= 50) {
                sndMerge.play();
                createItem(next, other.offsetLeft, other.offsetTop);
                dragged.remove();
                other.remove();
            }
        }
    });
}
</script>
</body>
</html>
